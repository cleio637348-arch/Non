<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>논단군 코코포 로그 백업기</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Serif+KR:wght@400;700&family=Hina+Mincho&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #121212;
            --bg-surface: #1a1a1a;
            --bg-card: #222222;
            --bg-input: #161616;
            --border-notion: rgba(255, 255, 255, 0.08);
            --border-active: rgba(255, 255, 255, 0.3);
            --text-main: rgba(255, 255, 255, 0.9);
            --text-muted: rgba(255, 255, 255, 0.4);
            --text-label: rgba(255, 255, 255, 0.6);
            --accent: #ffffff;
            --accent-soft: rgba(255, 255, 255, 0.1);

            --font-serif: "Hina Mincho", "Noto Serif KR", serif;
            --font-sans: "Noto Sans KR", "DM Sans", sans-serif;
            --font-ui: "DM Sans", "Noto Sans KR", sans-serif;
            --current-font: var(--font-sans);

            --script-bg: #111111;
            --script-text: #ffffff;
            --script-narrator: #e0e0e0;
            --script-sys: #888888;
            --script-border: #222222;
            --title-color: #ffffff;
            --title-bg: #222222;
            --title-border: rgba(255, 255, 255, 0.15);

            --radius-sm: 0px;
            --radius-md: 0px;
            --radius-lg: 0px;
        }

        *, *::before, *::after { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; width: 100%; background-color: var(--bg-main); }
        body {
            font-family: var(--font-sans); display: flex; flex-direction: column; align-items: center;
            padding: 40px 16px 80px; -webkit-font-smoothing: antialiased; letter-spacing: -0.01em;
            color: var(--text-main); min-height: 100vh;
        }

        .main-wrapper { width: 100%; max-width: 900px; display: flex; flex-direction: column; gap: 20px; }
        header { border-bottom: 1px solid var(--border-notion); padding-bottom: 24px; text-align: center; }
        .header-badge {
            display: inline-flex; align-items: center; gap: 6px; background: var(--accent-soft); border: 1px solid rgba(255,255,255,0.2);
            color: var(--text-main); font-size: 0.72rem; font-weight: 600; padding: 3px 10px; text-transform: uppercase;
        }
        header h1 { font-size: clamp(1.3rem, 4vw, 1.8rem); font-weight: 700; margin: 0 0 6px 0; }
        header p { margin: 0; font-size: 0.88rem; color: var(--text-muted); }

        .notion-card { background: var(--bg-card); border: 1px solid var(--border-notion); padding: 20px; width: 100%; }
        .card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 18px; padding-bottom: 14px; border-bottom: 1px solid var(--border-notion); }
        .notion-label { font-size: 0.72rem; font-weight: 700; letter-spacing: 0.06em; color: var(--text-label); text-transform: uppercase; }

        .output-room-title {
            font-family: var(--current-font); font-size: 1.25rem; font-weight: 700;
            color: var(--title-color) !important; background-color: var(--title-bg) !important;
            border: 1px solid var(--title-border) !important; margin: 10px 0 14px 0;
            padding: 13px 16px; text-align: center; cursor: pointer; user-select: none;
        }

        .grid-config { display: grid; grid-template-columns: 1fr; gap: 14px; margin-bottom: 14px; }
        @media (min-width: 560px) { .grid-config { grid-template-columns: repeat(2, 1fr); } }

        .input-group { display: flex; flex-direction: column; gap: 7px; }
        .input-group > .input-label { font-size: 0.78rem; color: var(--text-label); font-weight: 600; }

        input[type="text"], input[type="file"], input[type="search"] {
            width: 100%; background-color: var(--bg-input); border: 1px solid var(--border-notion);
            color: var(--text-main); font-size: 0.88rem; padding: 10px 12px; outline: none;
        }

        .switch-group { display: flex; gap: 6px; background: var(--bg-input); padding: 5px 6px; border: 1px solid var(--border-notion); align-items: center; }
        .switch-item { display: flex; align-items: center; gap: 7px; font-size: 0.84rem; cursor: pointer; color: var(--text-main); padding: 6px 10px; }

        .color-picker-panel { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 8px; background: var(--bg-input); padding: 12px; border: 1px solid var(--border-notion); max-height: 180px; overflow-y: auto; }
        .color-picker-item { display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.03); padding: 6px 10px; }
        .color-picker-item input[type="color"] { border: none; width: 26px; height: 26px; cursor: pointer; background: transparent; }

        .filter-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 8px; margin-top: 4px; }
        .filter-item { display: flex; align-items: center; gap: 7px; font-size: 0.84rem; cursor: pointer; padding: 5px 8px; border: 1px solid var(--border-notion); background: var(--bg-input); }

        .btn-group { display: flex; gap: 8px; width: 100%; }
        .notion-btn { background: none; border: 1px solid var(--border-notion); color: var(--text-main); cursor: pointer; padding: 11px 16px; font-size: 0.85rem; font-weight: 600; }
        .btn-submit { background: var(--accent-soft); border-color: rgba(255,255,255,0.2); flex: 2; }
        .btn-util { flex: 1; }

        .script-container { display: flex; flex-direction: column; gap: 1px; background-color: var(--script-bg); padding: 16px; border: 1px solid var(--script-border); width: 100%; }
        .script-container.collapsed { display: none !important; }

        /* 에디터 내부 공통 행 스타일 */
        .notion-row { 
            display: flex; align-items: center; justify-content: space-between; gap: 12px; 
            padding: 5px 8px; position: relative; width: 100%; transition: background-color 0.15s;
        }
        .notion-row:hover { background: rgba(255, 255, 255, 0.04); }

        /* [요구사항] 에디터 내 포커싱 상태 및 더블클릭 고정 선택자 */
        .notion-row:focus-within, .notion-row.is-focused-black {
            background-color: #000000 !important;
            color: #ffffff !important;
        }
        .notion-row:focus-within .notion-block, .notion-row.is-focused-black .notion-block {
            color: #ffffff !important;
        }
        .notion-row:focus-within .state-system-text, .notion-row.is-focused-black .state-system-text {
            color: #dddddd !important;
        }
        .notion-row:focus-within .char-name, .notion-row.is-focused-black .char-name,
        .notion-row:focus-within .char-name-inline, .notion-row.is-focused-black .char-name-inline {
            color: #ffffff !important;
        }

        .content-cell { display: flex; align-items: flex-start; gap: 10px; flex: 1; width: 100%; overflow: hidden; }
        .avatar-box { width: 28px; height: 28px; object-fit: cover; flex-shrink: 0; border: 1px solid rgba(255,255,255,0.1); background: #333; }
        .avatar-placeholder { width: 28px; flex-shrink: 0; }
        
        .notion-block { flex: 1; padding: 1px 4px; font-size: 0.95rem; line-height: 1.55; word-break: break-word; outline: none; color: var(--script-text) !important; white-space: pre-wrap; font-family: var(--current-font); width: 100%; }

        /* Roll20 단락 구조 */
        .roll20-layout { display: flex; align-items: flex-start; gap: 5px; flex-wrap: wrap; width: 100%; }
        .roll20-layout .char-name-inline { font-weight: 700; font-size: 0.95rem; white-space: nowrap; margin-right: 4px; }

        .control-cell { opacity: 0; position: absolute; right: 8px; top: 6px; z-index: 5; }
        .notion-row:hover .control-cell { opacity: 1; }
        .row-control { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.2); color: #ffffff; cursor: pointer; font-size: 0.7rem; padding: 2px 7px; }

        .floating-history-panel { position: fixed; bottom: 20px; right: 20px; background: rgba(26, 26, 26, 0.9); border: 1px solid rgba(255, 255, 255, 0.12); padding: 5px 10px; display: flex; gap: 2px; z-index: 10000; }
        .history-btn { background: none; border: none; color: rgba(255, 255, 255, 0.8); font-size: 0.83rem; font-weight: 600; padding: 7px 12px; cursor: pointer; }
        
        .char-name { font-size: 0.85rem; font-weight: 700; margin-bottom: 2px; display: block; }
        
        /* 서술자 및 시스템 메시지 베이스 단락 */
        .state-narrator { font-weight: 700; color: var(--script-narrator) !important; width: 100%; }
        .state-narrator.apply-italic { font-style: italic; }

        /* [요구사항] 시스템 메시지: 정렬 강제 없이 아바타/이름만 숨기고 회색 연출 */
        .state-system-text {
            font-size: 0.95rem;
            color: var(--script-sys) !important;
            width: 100%;
        }
        
        .character-divider { border-top: 1px solid rgba(255, 255, 255, 0.05); margin: 4px 0 2px 0; width: 100%; }
        .filtered-out { display: none !important; }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <header>
            <div class="header-badge">TRPG 로그 백업기</div>
            <h1>논단군 코코포 로그 백업기</h1>
            <p>직관적이고 편한 로그 백업기</p>
        </header>

        <div class="notion-card">
            <div class="card-header">
                <div class="notion-label">설정 센터</div>
            </div>
            <div class="grid-config">
                <div class="input-group">
                    <span class="input-label">1. 로그 파일 업로드 (.html)</span>
                    <input id="logFile" type="file" accept=".html">
                </div>
                <div class="input-group">
                    <span class="input-label">2. 서술자 이름 지정</span>
                    <input id="narratorName" type="text" placeholder="진행 캐릭터 또는 GM 이름 입력">
                </div>
            </div>
            <div class="grid-config">
                <div class="input-group">
                    <span class="input-label">3. 본문 스타일 선택</span>
                    <div class="switch-group">
                        <label class="switch-item"><input type="radio" name="colorTheme" value="roll20"> Roll20 </label>
                        <label class="switch-item"><input type="radio" name="colorTheme" value="ccfolia" checked> 코코포리아</label>
                    </div>
                </div>
                <div class="input-group">
                    <span class="input-label">4. 서체 선택</span>
                    <div class="switch-group">
                        <label class="switch-item"><input type="radio" name="fontPreset" value="sans" checked> 고딕</label>
                        <label class="switch-item"><input type="radio" name="fontPreset" value="serif"> 명조</label>
                    </div>
                </div>
            </div>
            <div class="grid-config">
                <div class="input-group">
                    <span class="input-label">5. 서술자 이텔릭체 효과</span>
                    <div class="switch-group">
                        <label class="switch-item"><input type="radio" name="narratorItalicToggle" value="on" checked> 켜기</label>
                        <label class="switch-item"><input type="radio" name="narratorItalicToggle" value="off"> 끄기</label>
                    </div>
                </div>
                <div class="input-group">
                    <span class="input-label">안내 및 팁</span>
                    <span style="color: var(--text-muted); font-size:0.75rem; line-height:1.4;">※ 본문 행을 [더블클릭]하면 검은색 배경 테마가 고정 마킹되어 그대로 저장 및 복사됩니다.</span>
                </div>
            </div>
            <div class="input-group" style="margin-top: 10px;">
                <span class="input-label">6. 캐릭터별 개별 색상 지정</span>
                <div id="characterColorPanel" class="color-picker-panel">
                    <span style="color: var(--text-muted); font-size: 0.83rem;">파일을 업로드하면 캐릭터명이 표시됩니다.</span>
                </div>
            </div>
            <div class="input-group" style="margin-top: 10px;">
                <span class="input-label">7. 탭 필터링</span>
                <div id="dynamicFilters" class="filter-container"></div>
            </div>
            <div class="input-group" style="margin-top: 14px;">
                <span class="input-label">로그 내용 실시간 검색</span>
                <input id="logSearchInput" type="search" placeholder="원하는 단어를 입력하세요...">
            </div>
        </div>

        <div class="btn-group">
            <button id="btnProcess" class="notion-btn btn-submit">실행</button>
            <button id="btnCopy" class="notion-btn btn-util">코드 복사</button>
            <button id="btnDownload" class="notion-btn btn-util">파일 저장</button>
        </div>

        <div id="dynamicTabsOutput"></div>
    </div>

    <div class="floating-history-panel">
        <button id="btnUndo" class="history-btn" disabled>뒤로</button>
        <button id="btnRedo" class="history-btn" disabled>앞으로</button>
        <button id="btnScrollTop" class="history-btn">↑ Top</button>
    </div>

    <script>
        let rawLogData = [];
        let detectedTabs = new Set();
        let detectedCharacters = new Set(); 
        let currentFontType = "sans"; 
        let currentColorTheme = "ccfolia"; 
        let undoStack = [];
        let redoStack = [];
        let isHistoryAction = false; 
        let globalRoomTitle = "세션 로그";

        const themeProfiles = {
            roll20: { bg: "#ffffff", text: "#111111", fallbackName: "#333333", narrator: "#000000", sys: "#777777", border: "#e0e0e0", title: "#111111", titleBg: "#ffffff", titleBorder: "rgba(0,0,0,0.15)" },
            ccfolia: { bg: "#111111", text: "#ffffff", fallbackName: "#cccccc", narrator: "#e0e0e0", sys: "#888888", border: "#222222", title: "#ffffff", titleBg: "#222222", titleBorder: "rgba(255,255,255,0.15)" }
        };

        function applyColorTheme(themeName) {
            currentColorTheme = themeName;
            const p = themeProfiles[themeName];
            const root = document.documentElement;
            root.style.setProperty('--script-bg', p.bg);
            root.style.setProperty('--script-text', p.text);
            root.style.setProperty('--script-narrator', p.narrator);
            root.style.setProperty('--script-sys', p.sys);
            root.style.setProperty('--script-border', p.border);
            root.style.setProperty('--title-color', p.title);
            root.style.setProperty('--title-bg', p.titleBg);
            root.style.setProperty('--title-border', p.titleBorder);
        }

        document.querySelectorAll('input[name="colorTheme"]').forEach(radio => {
            radio.addEventListener('change', (e) => { applyColorTheme(e.target.value); });
        });

        document.querySelectorAll('input[name="fontPreset"]').forEach(radio => {
            radio.addEventListener('change', (e) => {
                currentFontType = e.target.value;
                const fontValue = currentFontType === "serif" ? "var(--font-serif)" : "var(--font-sans)";
                document.documentElement.style.setProperty('--current-font', fontValue);
            });
        });

        document.getElementById('btnScrollTop').addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));

        document.getElementById('logFile').addEventListener('change', (e) => {
            const file = e.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                const parser = new DOMParser(); const doc = parser.parseFromString(event.target.result, 'text/html');
                globalRoomTitle = file.name.replace(/\.html$/i, "").replace(/\[all\]$/i, "").trim();
                
                let lines = doc.querySelectorAll('p, .msg, .chat-line'); if(lines.length === 0) lines = doc.querySelectorAll('body > div');
                rawLogData = []; detectedTabs.clear(); detectedCharacters.clear();
                
                lines.forEach(p => {
                    if (p.querySelector('p')) return; const text = p.textContent.trim(); if(!text) return;
                    let avatarSrc = p.querySelector('img')?.getAttribute('src') || "";
                    const match = text.match(/^\[([^\]]+)\]\s*([^:]+)\s*:\s*([\s\S]*)$/);
                    if (match) {
                        let tabName = match[1].trim(); let charName = match[2].trim(); let msgBody = match[3].trim();
                        detectedTabs.add(tabName); detectedCharacters.add(charName);
                        rawLogData.push({ tab: tabName, name: charName, message: msgBody, avatar: avatarSrc });
                    } else {
                        const simpleMatch = text.match(/^([^:]+)\s*:\s*([\s\S]*)$/);
                        if(simpleMatch) {
                            let charName = simpleMatch[1].trim(); let msgBody = simpleMatch[2].trim();
                            detectedTabs.add("Main"); detectedCharacters.add(charName);
                            rawLogData.push({ tab: "Main", name: charName, message: msgBody, avatar: avatarSrc });
                        } else {
                            rawLogData.push({ tab: "시스템", name: "", message: text, avatar: "" });
                        }
                    }
                });
                buildFilters(); buildCharacterColorPicker();
            };
            reader.readAsText(file, 'UTF-8');
        });

        function buildFilters() {
            const container = document.getElementById('dynamicFilters'); container.innerHTML = "";
            const sortedTabs = Array.from(detectedTabs).sort((a, b) => {
                if (a.toLowerCase() === 'main') return -1;
                if (b.toLowerCase() === 'main') return 1;
                return a.localeCompare(b);
            });
            sortedTabs.forEach(tab => {
                const label = document.createElement('label'); label.className = "filter-item";
                label.innerHTML = `<input type="checkbox" class="tab-chk" value="${tab}" checked> <span>${tab}</span>`;
                container.appendChild(label);
            });
        }

        function buildCharacterColorPicker() {
            const panel = document.getElementById('characterColorPanel'); panel.innerHTML = "";
            const p = themeProfiles[currentColorTheme]; const sortedChars = Array.from(detectedCharacters).sort();
            if(sortedChars.length === 0) {
                panel.innerHTML = `<span style="color: var(--text-muted); font-size: 0.85rem;">추출된 캐릭터가 없습니다.</span>`; return;
            }
            sortedChars.forEach(char => {
                const item = document.createElement('div'); item.className = "color-picker-item";
                item.innerHTML = `<span title="${char}">${char}</span><input type="color" class="char-color-input" data-char="${char}" value="${p.fallbackName}">`;
                panel.appendChild(item);
            });
        }

        function getCharacterColorMap() {
            const map = {}; document.querySelectorAll('.char-color-input').forEach(input => { map[input.dataset.char] = input.value; }); return map;
        }

        function saveHistoryState() {
            if (isHistoryAction) return;
            undoStack.push({ tabsHTML: document.getElementById('dynamicTabsOutput').innerHTML }); redoStack = []; updateHistoryButtons();
        }

        function updateHistoryButtons() {
            document.getElementById('btnUndo').disabled = undoStack.length === 0;
            document.getElementById('btnRedo').disabled = redoStack.length === 0;
        }

        document.getElementById('btnUndo').addEventListener('click', () => {
            if (undoStack.length === 0) return;
            redoStack.push({ tabsHTML: document.getElementById('dynamicTabsOutput').innerHTML });
            const prev = undoStack.pop(); restoreState(prev); updateHistoryButtons();
        });

        document.getElementById('btnRedo').addEventListener('click', () => {
            if (redoStack.length === 0) return;
            undoStack.push({ tabsHTML: document.getElementById('dynamicTabsOutput').innerHTML });
            const next = redoStack.pop(); restoreState(next); updateHistoryButtons();
        });

        function restoreState(state) {
            isHistoryAction = true; document.getElementById('dynamicTabsOutput').innerHTML = state.tabsHTML;
            attachAccordionEvents(); attachRowToggleEvents(); isHistoryAction = false;
        }

        function attachAccordionEvents() {
            document.querySelectorAll('.output-room-title').forEach(title => {
                title.onclick = function() {
                    const container = this.nextElementSibling;
                    if (container && container.classList.contains('script-container')) {
                        container.classList.toggle('collapsed');
                    }
                };
            });
        }

        // 특정 행 더블클릭 시 검은색 고정 마킹 토글 이벤트 바인딩
        function attachRowToggleEvents() {
            document.querySelectorAll('.notion-row').forEach(row => {
                row.ondblclick = function() {
                    saveHistoryState();
                    this.classList.toggle('is-focused-black');
                };
            });
        }

        document.getElementById('btnProcess').addEventListener('click', () => {
            if(rawLogData.length === 0) return alert('파일을 업로드하세요.');
            undoStack = []; redoStack = []; updateHistoryButtons();
            
            const narrator = document.getElementById('narratorName').value.trim();
            const charColorMap = getCharacterColorMap();
            const selectedTabs = Array.from(document.querySelectorAll('.tab-chk:checked')).map(c => c.value);
            const isItalic = document.querySelector('input[name="narratorItalicToggle"]:checked').value === "on";
            
            // 현재 활성화된 스타일값 재동기화
            const selectedTheme = document.querySelector('input[name="colorTheme"]:checked').value;
            applyColorTheme(selectedTheme);

            selectedTabs.sort((a, b) => {
                if (a.toLowerCase() === 'main') return -1;
                if (b.toLowerCase() === 'main') return 1;
                return a.localeCompare(b);
            });

            const dynamicTabsOutput = document.getElementById('dynamicTabsOutput');
            dynamicTabsOutput.innerHTML = ""; const tabContainers = {}; const tabLastSpeakerType = {}; 

            selectedTabs.forEach(t => {
                const card = document.createElement('div'); card.className = "notion-card";
                card.innerHTML = `
                    <div class="notion-label">세션 로그 채널 — [${t}]</div>
                    <h2 class="output-room-title">${globalRoomTitle} - ${t}</h2>
                    <div class="script-container"></div>
                `;
                dynamicTabsOutput.appendChild(card);
                tabContainers[t] = card.querySelector('.script-container'); tabLastSpeakerType[t] = "";
            });

            const p = themeProfiles[currentColorTheme];
            
            rawLogData.forEach(log => {
                let currentTargetTab = log.tab;
                if(log.tab === "시스템") { currentTargetTab = selectedTabs[0] || null; }
                if(!currentTargetTab || !selectedTabs.includes(currentTargetTab)) return;
                
                const targetContainer = tabContainers[currentTargetTab];
                const isNarr = narrator && log.name === narrator; 
                const isSys = log.name === "";
                const currentType = isSys ? "__SYS__" : (isNarr ? "__NARR__" : log.name);
                const lastType = tabLastSpeakerType[currentTargetTab];

                if (lastType && lastType !== currentType) {
                    const divider = document.createElement('div'); divider.className = "character-divider"; targetContainer.appendChild(divider);
                }
                const same = (lastType === currentType && !isNarr && !isSys); tabLastSpeakerType[currentTargetTab] = currentType;

                const row = document.createElement('div'); row.className = "notion-row"; row.dataset.tab = currentTargetTab; row.dataset.speaker = log.name;
                row.dataset.sys = isSys ? "true" : "false"; row.dataset.narr = isNarr ? "true" : "false";
                let cleanMessage = log.message;

                let inner = `<div class="content-cell">`;
                
                if(isSys) {
                    /* [요구사항] 아바타, 이름 완전히 배제하고 좌측 정렬 회색 단락 처리 */
                    inner += `<div class="notion-block state-system-text" contenteditable="true" spellcheck="false">${cleanMessage}</div>`;
                } else if(isNarr) {
                    /* [요구사항] 서술자 메시지 연출 제어 */
                    const italicClass = isItalic ? "apply-italic" : "";
                    inner += `<div class="notion-block state-narrator ${italicClass}" contenteditable="true" spellcheck="false">${cleanMessage}</div>`;
                } else {
                    const assignedColor = charColorMap[log.name] || p.fallbackName;
                    if(currentColorTheme === "roll20") {
                        /* [요구사항] 이름 : 대사 레이아웃 한 줄 형태 완벽 가공 */
                        inner += `<div class="roll20-layout">`;
                        if(!same) {
                            inner += `<span class="char-name-inline" style="color:${assignedColor}">${log.name} :</span>`;
                        } else {
                            inner += `<span class="char-name-inline" style="opacity:0; pointer-events:none;">${log.name} :</span>`;
                        }
                        inner += `<span class="inline-msg-body" contenteditable="true" spellcheck="false" style="outline:none; display:inline-block; flex:1;">${cleanMessage}</span></div>`;
                    } else {
                        inner += same ? `<div class="avatar-placeholder"></div>` : (log.avatar ? `<img src="${log.avatar}" class="avatar-box">` : `<div class="avatar-box"></div>`);
                        inner += `<div style="flex:1;">${!same ? `<span class="char-name" style="color:${assignedColor}">${log.name}</span>`:''}<div class="notion-block" contenteditable="true" spellcheck="false">${cleanMessage}</div></div>`;
                    }
                }
                
                inner += `</div><div class="control-cell"><button class="row-control" onclick="saveHistoryState(); this.closest('.notion-row').remove();">del</button></div>`;
                row.innerHTML = inner; targetContainer.appendChild(row);
            });
            
            const fontValue = currentFontType === "serif" ? "var(--font-serif)" : "var(--font-sans)";
            document.querySelectorAll('.output-room-title').forEach(el => el.style.fontFamily = fontValue);
            attachAccordionEvents(); attachRowToggleEvents();
        });

        function buildFinal() {
            const chosenFont = currentFontType === "serif" ? `'Hina Mincho', 'Noto Serif KR', serif` : `'Noto Sans KR', sans-serif`;
            const p = themeProfiles[currentColorTheme]; const charColorMap = getCharacterColorMap();
            const isItalic = document.querySelector('input[name="narratorItalicToggle"]:checked').value === "on";
            
            const bodyBg = currentColorTheme === "roll20" ? "#ffffff" : "#111111";
            const bodyText = currentColorTheme === "roll20" ? "#111111" : "rgba(255,255,255,0.85)";

            let out = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>세션 로그 백업</title><style>
                @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&family=Noto+Serif+KR:wght@400;700&family=Hina+Mincho&display=swap');
                * { box-sizing: border-box; margin: 0; padding: 0; }
                html, body { background-color: ${bodyBg} !important; }
                body { color: ${bodyText} !important; font-family:'Noto Sans KR', sans-serif; padding: 50px 24px; display: flex; flex-direction: column; align-items: center; }
                .page-wrap { width: 100%; max-width: 850px; }
                h1 { font-family:${chosenFont}; font-size:1.4rem; text-align:center; color:${p.title} !important; background-color:${p.titleBg} !important; border:1px solid ${p.titleBorder} !important; padding:14px; margin-bottom:14px; font-weight:700; cursor:pointer; user-select:none; }
                .script-box { display:flex; flex-direction:column; gap:1px; background:${p.bg} !important; padding:20px; border:1px solid ${p.border}; margin-bottom:28px; width:100%; }
                .script-box.collapsed { display:none !important; }
                .row { display:flex; align-items:flex-start; gap:12px; padding:5px 6px; width:100%; transition: background-color 0.15s; }
                
                /* [요구사항] 저장 파일 전용 검정색 배경/흰색 글씨 클래스 선택자 */
                .row.save-focused-black {
                    background-color: #000000 !important;
                    color: #ffffff !important;
                }
                .row.save-focused-black .msg, .row.save-focused-black .r20-body, .row.save-focused-black .system-text-node {
                    color: #ffffff !important;
                }
                .row.save-focused-black .name, .row.save-focused-black .r20-name {
                    color: #ffffff !important;
                }

                .avatar { width:28px; height:28px; object-fit:cover; flex-shrink:0; background:#444; }
                .msg { font-family:${chosenFont}; font-size:0.95rem; line-height:1.55; white-space:pre-wrap; flex:1; color:${p.text} !important; word-break:break-word; }
                .name { font-size:0.85rem; font-weight:700; display:block; margin-bottom:2px; }
                .narrator { font-weight:700; ${isItalic ? 'font-style:italic;' : ''} color:${p.narrator} !important; width:100%; }
                .system-text-node { color:${p.sys} !important; font-size:0.95rem; width:100%; white-space:pre-wrap; }
                .divider { border-top:1px solid rgba(128,128,128,0.15); margin:6px 0; }
                .r20-wrap { display:flex; align-items:flex-start; gap:5px; flex-wrap:wrap; font-family:${chosenFont}; font-size:0.95rem; line-height:1.55; color:${p.text} !important; width:100%; }
                .r20-name { font-weight:700; white-space:nowrap; margin-right:4px; }
                b { font-weight:bold; } i { font-style:italic; } s { text-decoration:line-through; }
            </style></head><body><div class="page-wrap">`;

            const process = (nodes) => {
                let res = ""; let last = "";
                nodes.forEach(el => {
                    if(el.classList.contains('character-divider')) { res+='<div class="divider"></div>'; return; }
                    
                    const isN = el.dataset.narr === "true", isS = el.dataset.sys === "true";
                    const isFocusedBlack = el.classList.contains('is-focused-black');
                    const rowClass = isFocusedBlack ? "row save-focused-black" : "row";
                    
                    const block = el.querySelector('.notion-block') || el.querySelector('.inline-msg-body') || el.querySelector('.state-system-text'); 
                    if(!block) return;
                    
                    let cleanHTML = block.innerHTML;
                    const spk = el.dataset.speaker || ""; const same = (last === spk && !isN && !isS); last = (isN?"_N":isS?"_S":spk);
                    
                    if(isS) {
                        res += `<div class="${rowClass}"><div class="system-text-node">${cleanHTML}</div></div>`;
                    } else if(isN) {
                        res += `<div class="${rowClass}"><div class="msg narrator">${cleanHTML}</div></div>`;
                    } else {
                        const finalColor = charColorMap[spk] || p.fallbackName;
                        if(currentColorTheme === "roll20") {
                            res += `<div class="${rowClass}"><div class="r20-wrap">`;
                            if(!same) res += `<span class="r20-name" style="color:${finalColor}">${spk} :</span>`;
                            else res += `<span class="r20-name" style="opacity:0; pointer-events:none; margin-right:4px;">${spk} :</span>`;
                            res += `<span class="r20-body">${cleanHTML}</span></div></div>`;
                        } else {
                            res += `<div class="${rowClass}">`;
                            const img = el.querySelector('.avatar-box')?.src;
                            res += !same ? (img ? `<img src="${img}" class="avatar">` : `<div class="avatar"></div>`) : `<div style="width:28px;flex-shrink:0"></div>`;
                            res += `<div>${!same?`<span class="name" style="color:${finalColor}">${spk}</span>`:''}<div class="msg">${cleanHTML}</div></div></div>`;
                        }
                    }
                }); return res;
            };

            const cards = document.querySelectorAll('#dynamicTabsOutput > .notion-card');
            cards.forEach((card, idx) => {
                const titleText = card.querySelector('.output-room-title').innerText;
                out += `<h1 onclick="const box=document.getElementById('box_${idx}'); box.style.display=(box.style.display==='none'?'flex':'none');">${titleText}</h1>`;
                out += `<div id="box_${idx}" class="script-box">${process(card.querySelectorAll('.script-container > div'))}</div>`;
            });
            return out + '</div></body></html>';
        }

        document.getElementById('btnCopy').addEventListener('click', () => {
            navigator.clipboard.writeText(buildFinal()).then(() => {
                const btn = document.getElementById('btnCopy'); const orig = btn.textContent; btn.textContent = "복사 완료";
                setTimeout(() => { btn.textContent = orig; }, 2000);
            });
        });
        
        document.getElementById('btnDownload').addEventListener('click', () => {
            const blob = new Blob([buildFinal()], { type: 'text/html;charset=utf-8;' });
            const link = document.createElement("a"); link.href = URL.createObjectURL(blob);
            link.download = `Log_Backup.html`; link.click();
        });

        document.getElementById('logSearchInput').addEventListener('input', function(e) {
            const k = e.target.value.toLowerCase().trim();
            document.querySelectorAll('.notion-row').forEach(r => {
                const block = r.querySelector('.notion-block') || r.querySelector('.inline-msg-body') || r.querySelector('.state-system-text'); if(!block) return;
                if(block.innerText.toLowerCase().includes(k) || k === '') r.classList.remove('filtered-out');
                else r.classList.add('filtered-out');
            });
        });
    </script>
</body>
</html>
