<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>논단군 코코포 로그 백업기 (정밀 파싱 통합본)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Serif+KR:wght@400;700&family=Hina+Mincho&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #121212;
            --bg-surface: #1a1a1a;
            --bg-card: #222222;
            --bg-input: #161616;
            --border-notion: rgba(255, 255, 255, 0.08);
            --border-active: rgba(255, 255, 255, 0.3);
            --text-main: rgba(255, 255, 255, 0.9);
            --text-muted: rgba(255, 255, 255, 0.4);
            --text-label: rgba(255, 255, 255, 0.6);
            --accent: #ffffff;
            --accent-soft: rgba(255, 255, 255, 0.1);

            --font-serif: "Hina Mincho", "Noto Serif KR", serif;
            --font-sans: "Noto Sans KR", "DM Sans", sans-serif;
            --font-ui: "DM Sans", "Noto Sans KR", sans-serif;
            --current-font: var(--font-sans);

            --script-bg: #111111;
            --script-text: #ffffff;
            --script-narrator: #e0e0e0;
            --script-sys: #888888;
            --script-border: #222222;
            --title-color: #ffffff;
            --title-bg: #222222;
            --title-border: rgba(255, 255, 255, 0.15);

            --radius-sm: 0px;
            --radius-md: 0px;
            --radius-lg: 0px;
        }

        *, *::before, *::after { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; width: 100%; background-color: var(--bg-main); }
        body {
            font-family: var(--font-sans); display: flex; flex-direction: column; align-items: center;
            padding: 40px 16px 80px; color: var(--text-main); min-height: 100vh;
            -webkit-font-smoothing: antialiased; letter-spacing: -0.01em;
        }

        .main-wrapper { width: 100%; max-width: 900px; display: flex; flex-direction: column; gap: 20px; }
        header { border-bottom: 1px solid var(--border-notion); padding-bottom: 24px; text-align: center; }
        .header-badge {
            display: inline-flex; align-items: center; gap: 6px;
            background: var(--accent-soft); border: 1px solid rgba(255,255,255,0.2);
            color: var(--text-main); font-size: 0.72rem; font-weight: 600; padding: 3px 10px; margin-bottom: 12px;
        }
        header h1 { font-size: clamp(1.3rem, 4vw, 1.8rem); font-weight: 700; margin: 0 0 6px 0; }
        header p { margin: 0; font-size: 0.88rem; color: var(--text-muted); }

        .notion-card { background: var(--bg-card); border: 1px solid var(--border-notion); padding: 20px; width: 100%; }
        .card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 18px; padding-bottom: 14px; border-bottom: 1px solid var(--border-notion); }
        .notion-label { font-size: 0.72rem; font-weight: 700; letter-spacing: 0.06em; color: var(--text-label); text-transform: uppercase; }

        .output-room-title {
            font-family: var(--current-font); font-size: 1.15rem; font-weight: 700;
            color: var(--title-color) !important; background-color: var(--title-bg) !important;
            border: 1px solid var(--title-border) !important; margin: 10px 0 14px 0;
            padding: 12px 16px; text-align: center; cursor: pointer; user-select: none;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .output-room-title::after { content: "▾"; font-size: 0.8rem; opacity: 0.5; transition: transform 0.2s; }
        .output-room-title.is-collapsed::after { transform: rotate(-90deg); }

        .grid-config { display: grid; grid-template-columns: 1fr; gap: 14px; margin-bottom: 14px; }
        @media (min-width: 560px) { .grid-config { grid-template-columns: repeat(2, 1fr); } }

        .input-group { display: flex; flex-direction: column; gap: 7px; }
        .input-group > .input-label { font-size: 0.78rem; color: var(--text-label); font-weight: 600; }

        input[type="text"], input[type="file"], input[type="search"] {
            width: 100%; background-color: var(--bg-input); border: 1px solid var(--border-notion);
            color: var(--text-main); font-size: 0.88rem; padding: 10px 12px; outline: none;
        }

        .switch-group { display: flex; gap: 6px; background: var(--bg-input); padding: 5px 6px; border: 1px solid var(--border-notion); align-items: center; flex-wrap: wrap; }
        .switch-item { display: flex; align-items: center; gap: 7px; font-size: 0.84rem; cursor: pointer; padding: 6px 10px; }

        .color-picker-panel { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 8px; background: var(--bg-input); padding: 12px; border: 1px solid var(--border-notion); max-height: 180px; overflow-y: auto; }
        .color-picker-item { display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.03); padding: 6px 10px; border: 1px solid rgba(255,255,255,0.05); }
        .color-picker-item span { font-size: 0.83rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 110px; }
        .color-picker-item input[type="color"] { border: none; width: 26px; height: 26px; cursor: pointer; background: transparent; padding: 0; }

        .filter-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 8px; margin-top: 4px; }
        .filter-item { display: flex; align-items: center; gap: 7px; font-size: 0.84rem; cursor: pointer; padding: 5px 8px; border: 1px solid var(--border-notion); background: var(--bg-input); }

        .btn-group { display: flex; gap: 8px; width: 100%; flex-wrap: wrap; }
        .notion-btn { background: none; border: 1px solid var(--border-notion); color: var(--text-main); cursor: pointer; padding: 11px 16px; font-size: 0.85rem; font-weight: 600; }
        .btn-submit { background: var(--accent-soft); border-color: rgba(255,255,255,0.2); flex: 2; min-width: 100px; }
        .btn-util { flex: 1; min-width: 80px; }

        .spell-report-card { background: var(--bg-card); border: 1px solid rgba(255,255,255,0.2); padding: 18px 20px; display: none; }
        .spell-report-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; border-bottom: 1px solid rgba(255, 255, 255, 0.06); padding-bottom: 10px; }
        .spell-report-title { font-size: 0.88rem; font-weight: 700; }
        .spell-report-actions { display: flex; gap: 6px; }
        .spell-btn-all { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3); color: #fff; padding: 6px 14px; font-size: 0.78rem; cursor: pointer; }
        .spell-report-list { max-height: 220px; overflow-y: auto; font-size: 0.82rem; display: flex; flex-direction: column; gap: 7px; }
        .spell-report-item { display: flex; align-items: flex-start; justify-content: space-between; padding: 10px; background: var(--bg-input); border: 1px solid var(--border-notion); }
        .spell-fix-trigger { background: var(--accent-soft); border: 1px solid rgba(255,255,255,0.2); color: #fff; padding: 4px 10px; font-size: 0.74rem; cursor: pointer; }

        .script-container { display: flex; flex-direction: column; gap: 1px; background-color: var(--script-bg); padding: 16px; border: 1px solid var(--script-border); width: 100%; }
        .script-container.collapsed { display: none !important; }

        .notion-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 4px 8px; position: relative; width: 100%; }
        .notion-row.filtered-out { display: none !important; }
        .notion-row:hover { background: rgba(255, 255, 255, 0.04); }

        .content-cell { display: flex; align-items: flex-start; gap: 10px; flex: 1; width: 100%; overflow: hidden; }
        .notion-block { flex: 1; padding: 1px 4px; font-size: 0.95rem; line-height: 1.55; word-break: break-word; outline: none; color: var(--script-text) !important; white-space: pre-wrap; font-family: var(--current-font); width: 100%; }

        .control-cell { opacity: 0; transition: opacity 0.15s ease; position: absolute; right: 8px; top: 6px; z-index: 5; }
        .notion-row:hover .control-cell { opacity: 1; }
        .row-control { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.2); color: #fff; cursor: pointer; font-size: 0.7rem; padding: 2px 7px; }

        .floating-history-panel { position: fixed; bottom: 20px; right: 20px; background: rgba(26, 26, 26, 0.9); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.12); padding: 5px 10px; display: flex; gap: 2px; z-index: 10000; }
        .history-btn { background: none; border: none; color: rgba(255, 255, 255, 0.8); font-size: 0.83rem; padding: 7px 12px; cursor: pointer; }
        .history-btn:disabled { opacity: 0.25; cursor: not-allowed; }
        
        /* Roll20 스타일을 반영한 전형적인 이름:대사 구조 포맷팅 */
        .msg-line { display: block; width: 100%; }
        .char-name { font-weight: 700; font-size: 0.95rem; margin-right: 6px; display: inline; }
        .char-msg { display: inline; }
        
        /* 시스템 및 서술자 고유 스타일 */
        .state-narrator { text-align: left; font-weight: 500; color: var(--script-narrator) !important; width: 100%; }
        .state-system { font-size: 0.88rem; color: var(--script-sys) !important; font-style: italic; opacity: 0.8; }

        #textStyler { position: absolute; display: none; background: #222222; border: 1px solid rgba(255,255,255,0.15); z-index: 9999; padding: 5px 8px; gap: 4px; align-items: center; }
        #textStyler button { background: none; border: none; color: #fff; font-size: 0.82rem; padding: 3px 7px; cursor: pointer; }
        .color-chip { width: 15px; height: 15px; cursor: pointer; display: inline-block; border: 1px solid rgba(255, 255, 255, 0.3); }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <header>
            <div class="header-badge">TRPG 로그 백업기 v2</div>
            <h1>논단군 코코포 로그 백업기</h1>
            <p>Roll20 형태의 [이름: 대사] 양식 및 시스템 메세지 필터링 완벽 지원</p>
        </header>

        <div class="notion-card">
            <div class="card-header"><div class="notion-label">설정 센터</div></div>
            <div class="grid-config">
                <div class="input-group">
                    <span class="input-label">1. 로그 파일 업로드 (.html)</span>
                    <input id="logFile" type="file" accept=".html">
                </div>
                <div class="input-group">
                    <span class="input-label">2. 서술자 이름 지정 (선택)</span>
                    <input id="narratorName" type="text" placeholder="진행 캐릭터 이름 입력">
                </div>
            </div>
            <div class="grid-config">
                <div class="input-group">
                    <span class="input-label">3. 본문 스타일 선택</span>
                    <div class="switch-group">
                        <label class="switch-item"><input type="radio" name="colorTheme" value="roll20"> 흰색 배경 (Roll20)</label>
                        <label class="switch-item"><input type="radio" name="colorTheme" value="ccfolia" checked> 검은색 배경 (코코포리아)</label>
                    </div>
                </div>
                <div class="input-group">
                    <span class="input-label">4. 서체 선택</span>
                    <div class="switch-group">
                        <label class="switch-item"><input type="radio" name="fontPreset" value="sans" checked> 고딕</label>
                        <label class="switch-item"><input type="radio" name="fontPreset" value="serif"> 명조</label>
                    </div>
                </div>
            </div>
            <div class="grid-config">
                <div class="input-group" style="grid-column: span 2;">
                    <span class="input-label">5. 맞춤법 교정 연동</span>
                    <div class="switch-group">
                        <label class="switch-item"><input type="radio" name="spellCheckToggle" value="off" checked> 끄기</label>
                        <label class="switch-item"><input type="radio" name="spellCheckToggle" value="on"> 켜기</label>
                    </div>
                </div>
            </div>
            <div class="input-group" style="margin-top: 10px;">
                <span class="input-label">6. 캐릭터별 개별 색상 지정</span>
                <div id="characterColorPanel" class="color-picker-panel">
                    <span style="color: var(--text-muted); font-size: 0.83rem;">파일을 업로드하면 캐릭터 목록이 나타납니다.</span>
                </div>
            </div>
            <div class="input-group" style="margin-top: 10px;">
                <span class="input-label">7. 대화 탭 필터링</span>
                <div id="dynamicFilters" class="filter-container"></div>
            </div>
            <div class="input-group" style="margin-top: 14px;">
                <span class="input-label">로그 내용 실시간 검색</span>
                <input id="logSearchInput" type="search" placeholder="검색할 단어 입력...">
            </div>
        </div>

        <div class="btn-group">
            <button id="btnProcess" class="notion-btn btn-submit">실행 및 변환</button>
            <button id="btnCopy" class="notion-btn btn-util">코드 복사</button>
            <button id="btnDownload" class="notion-btn btn-util">파일 저장</button>
        </div>

        <div id="spellReportCard" class="spell-report-card">
            <div class="spell-report-header">
                <div class="spell-report-title">맞춤법 실시간 교정 리포트</div>
                <div class="spell-report-actions">
                    <button id="btnSpellFixAll" class="spell-btn-all">모두 교정</button>
                    <button id="btnSpellDismiss" class="spell-btn-all" style="background:none; border:1px solid var(--border-notion);">닫기</button>
                </div>
            </div>
            <div id="spellReportList" class="spell-report-list"></div>
        </div>

        <div id="dynamicTabsOutput"></div>
    </div>

    <div id="textStyler">
        <button data-cmd="bold"><b>B</b></button>
        <button data-cmd="italic"><i>I</i></button>
        <button data-cmd="strikeThrough"><s>S</s></button>
    </div>

    <div class="floating-history-panel">
        <button id="btnUndo" class="history-btn" disabled>뒤로</button>
        <button id="btnRedo" class="history-btn" disabled>앞으로</button>
    </div>

    <script>
        let parsedLogs = [];
        let detectedTabs = new Set();
        let detectedCharacters = new Set();
        let currentFontType = "sans";
        let currentColorTheme = "ccfolia";
        let undoStack = [];
        let redoStack = [];
        let globalRoomTitle = "세션 로그";

        const themeProfiles = {
            roll20: { bg: "#ffffff", text: "#111111", narrator: "#000000", sys: "#777777", border: "#e5e5e5", title: "#111111", titleBg: "#f5f5f5", titleBorder: "rgba(0,0,0,0.15)" },
            ccfolia: { bg: "#111111", text: "#ffffff", narrator: "#e0e0e0", sys: "#888888", border: "#222222", title: "#ffffff", titleBg: "#222222", titleBorder: "rgba(255,255,255,0.15)" }
        };

        const spellRules = [
            { wrong: /됬/g, right: "됐" }, { wrong: /되었다/g, right: "됐다" }, { wrong: /되었어/g, right: "됐어" },
            { wrong: /않하고/g, right: "안 하고" }, { wrong: /않돼/g, right: "안 돼" }, { wrong: /구지/g, right: "굳이" },
            { wrong: /역활/g, right: "역할" }, { wrong: /몇일/g, right: "며칠" }, { wrong: /케릭터/g, right: "캐릭터" }
        ];

        function applyColorTheme(themeName) {
            currentColorTheme = themeName;
            const p = themeProfiles[themeName];
            const root = document.documentElement;
            root.style.setProperty('--script-bg', p.bg);
            root.style.setProperty('--script-text', p.text);
            root.style.setProperty('--script-narrator', p.narrator);
            root.style.setProperty('--script-sys', p.sys);
            root.style.setProperty('--script-border', p.border);
            root.style.setProperty('--title-color', p.title);
            root.style.setProperty('--title-bg', p.titleBg);
            root.style.setProperty('--title-border', p.titleBorder);
        }

        document.querySelectorAll('input[name="colorTheme"]').forEach(r => {
            r.addEventListener('change', (e) => applyColorTheme(e.target.value));
        });

        document.querySelectorAll('input[name="fontPreset"]').forEach(r => {
            r.addEventListener('change', (e) => {
                currentFontType = e.target.value;
                document.documentElement.style.setProperty('--current-font', currentFontType === "serif" ? "var(--font-serif)" : "var(--font-sans)");
            });
        });

        // 파일 정밀 파싱 엔진
        document.getElementById('logFile').addEventListener('change', (e) => {
            const file = e.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                const parser = new DOMParser();
                const doc = parser.parseFromString(event.target.result, 'text/html');
                globalRoomTitle = file.name.replace(/\.html$/i, "").trim();

                parsedLogs = []; detectedTabs.clear(); detectedCharacters.clear();

                // 코코포리아 특유의 p 태그 내부 구조 순회
                const pElements = doc.querySelectorAll('p');
                pElements.forEach(p => {
                    // [대화탭] 영역 파싱
                    let tabName = "Main";
                    const tabSpan = p.querySelector('span[style*="secondary"], span:first-child');
                    let textContent = p.innerText || p.textContent;
                    
                    if (tabSpan && tabSpan.innerText.startsWith('[') && tabSpan.innerText.endsWith(']')) {
                        tabName = tabSpan.innerText.replace(/[\[\]]/g, '').trim();
                    } else {
                        const tabMatch = textContent.match(/^\[([^\]]+)\]/);
                        if (tabMatch) tabName = tabMatch[1].trim();
                    }

                    // 이름 및 대사 분리 기법 (코코포리아 표준 태그 구조 추적)
                    const boldNameEl = p.querySelector('strong, b');
                    let charName = "";
                    let messageText = "";

                    if (boldNameEl) {
                        // <b> 태그나 <strong> 태그가 존재하는 정상 대화 로그
                        charName = boldNameEl.innerText.replace(/[\s:]+$/, "").trim();
                        
                        // 이름 구조 뒤에 오는 순수 대사 텍스트 추출
                        let node = boldNameEl.nextSibling;
                        let parts = [];
                        while(node) {
                            parts.push(node.textContent);
                            node = node.nextSibling;
                        }
                        messageText = parts.join("").replace(/^\s*:\s*/, "").trim();
                    } else {
                        // 구조가 깨졌거나 시스템 메세지인 경우 정규식 2차 필터링
                        const fallbackMatch = textContent.match(/^(\[[^\]]+\])?\s*([^:]+)\s*:\s*([\s\S]*)$/);
                        if (fallbackMatch) {
                            charName = fallbackMatch[2].trim();
                            messageText = fallbackMatch[3].trim();
                        } else {
                            // 콜론(:) 조차 없는 문장은 캐릭터가 아닌 완전히 '시스템 메세지'로 우회 처리
                            charName = "";
                            messageText = textContent.replace(/^\[[^\]]+\]\s*/, "").trim();
                        }
                    }

                    // 최종 정제 및 검증 작업
                    if (!charName || charName.length > 25 || charName.includes('\n')) {
                        // 이름이 너무 길거나 비정상적이면 시스템 메시지로 분류
                        parsedLogs.push({ tab: "시스템", name: "", message: textContent.trim() });
                    } else {
                        detectedTabs.add(tabName);
                        detectedCharacters.add(charName);
                        parsedLogs.push({ tab: tabName, name: charName, message: messageText });
                    }
                });

                buildFilters();
                buildCharacterColorPicker();
            };
            reader.readAsText(file, 'UTF-8');
        });

        function buildFilters() {
            const container = document.getElementById('dynamicFilters'); container.innerHTML = "";
            const tabs = Array.from(detectedTabs).sort();
            if(tabs.length === 0) tabs.push("Main");
            tabs.forEach(tab => {
                const label = document.createElement('label'); label.className = "filter-item";
                label.innerHTML = `<input type="checkbox" class="tab-chk" value="${tab}" checked> <span>${tab}</span>`;
                container.appendChild(label);
            });
        }

        function buildCharacterColorPicker() {
            const panel = document.getElementById('characterColorPanel'); panel.innerHTML = "";
            const chars = Array.from(detectedCharacters).sort();
            if(chars.length === 0) {
                panel.innerHTML = `<span style="color: var(--text-muted); font-size: 0.83rem;">추출된 일반 캐릭터가 없습니다.</span>`; return;
            }
            chars.forEach(char => {
                const item = document.createElement('div'); item.className = "color-picker-item";
                item.innerHTML = `<span title="${char}">${char}</span><input type="color" class="char-color-input" data-char="${char}" value="${currentColorTheme === 'roll20' ? '#111111' : '#ffffff'}">`;
                panel.appendChild(item);
            });
        }

        function getCharacterColorMap() {
            const map = {}; document.querySelectorAll('.char-color-input').forEach(i => { map[i.dataset.char] = i.value; }); return map;
        }

        function saveHistoryState() {
            undoStack.push({ html: document.getElementById('dynamicTabsOutput').innerHTML });
            redoStack = []; document.getElementById('btnUndo').disabled = false; document.getElementById('btnRedo').disabled = true;
        }

        document.getElementById('btnUndo').addEventListener('click', () => {
            if(undoStack.length === 0) return;
            redoStack.push({ html: document.getElementById('dynamicTabsOutput').innerHTML });
            document.getElementById('dynamicTabsOutput').innerHTML = undoStack.pop().html;
            document.getElementById('btnUndo').disabled = undoStack.length === 0;
            document.getElementById('btnRedo').disabled = false;
            attachAccordionEvents();
        });

        document.getElementById('btnRedo').addEventListener('click', () => {
            if(redoStack.length === 0) return;
            undoStack.push({ html: document.getElementById('dynamicTabsOutput').innerHTML });
            document.getElementById('dynamicTabsOutput').innerHTML = redoStack.pop().html;
            document.getElementById('btnRedo').disabled = redoStack.length === 0;
            document.getElementById('btnUndo').disabled = false;
            attachAccordionEvents();
        });

        function attachAccordionEvents() {
            document.querySelectorAll('.output-room-title').forEach(title => {
                title.onclick = function() {
                    const container = this.nextElementSibling;
                    container.classList.toggle('collapsed');
                    this.classList.toggle('is-collapsed', container.classList.contains('collapsed'));
                };
            });
        }

        // 실행 및 뷰 빌드 함수
        document.getElementById('btnProcess').addEventListener('click', () => {
            if(parsedLogs.length === 0) return alert('파일을 먼저 업로드해 주세요.');
            
            const narrator = document.getElementById('narratorName').value.trim();
            const charColorMap = getCharacterColorMap();
            const selectedTabs = Array.from(document.querySelectorAll('.tab-chk:checked')).map(c => c.value);
            if(selectedTabs.length === 0) selectedTabs.push("Main");

            const outputArea = document.getElementById('dynamicTabsOutput');
            outputArea.innerHTML = "";

            const containers = {};
            selectedTabs.forEach(t => {
                const card = document.createElement('div'); card.className = "notion-card";
                card.innerHTML = `
                    <div class="notion-label">채널 — [${t}]</div>
                    <h2 class="output-room-title">${globalRoomTitle} - ${t}</h2>
                    <div class="script-container"></div>
                `;
                outputArea.appendChild(card);
                containers[t] = card.querySelector('.script-container');
            });

            parsedLogs.forEach(log => {
                let targetTab = log.tab;
                if(log.tab === "시스템") targetTab = selectedTabs[0] || "Main";
                if(!containers[targetTab]) return;

                const targetContainer = containers[targetTab];
                const isNarr = narrator && log.name === narrator;
                const isSys = log.name === "";

                const row = document.createElement('div');
                row.className = "notion-row";
                row.dataset.speaker = log.name;

                let inner = `<div class="content-cell">`;
                if (!isNarr && !isSys) {
                    // 유저가 원한 전통적인 Roll20 [이름: 대사] 한 줄 구조 매핑 및 개별 색상 부여
                    const color = charColorMap[log.name] || (currentColorTheme === 'roll20' ? '#111111' : '#ffffff');
                    inner += `<div class="notion-block msg-line" contenteditable="true" spellcheck="false">` +
                             `<span class="char-name" style="color:${color};">${log.name} :</span>` +
                             `<span class="char-msg">${log.message}</span></div>`;
                } else if (isNarr) {
                    inner += `<div class="notion-block state-narrator" contenteditable="true" spellcheck="false">${log.message}</div>`;
                } else {
                    // 시스템 메시지는 캐릭터 이름 없이 별도 디자인으로 완전 분리 처리
                    inner += `<div class="notion-block state-system" contenteditable="true" spellcheck="false">${log.message}</div>`;
                }
                inner += `</div><div class="control-cell"><button class="row-control" onclick="saveHistoryState(); this.closest('.notion-row').remove();">삭제</button></div>`;
                
                row.innerHTML = inner;
                targetContainer.appendChild(row);
            });

            attachAccordionEvents();
            runSpellChecker();
        });

        function runSpellChecker() {
            const isEnabled = document.querySelector('input[name="spellCheckToggle"]:checked').value === "on";
            const reportCard = document.getElementById('spellReportCard');
            const reportList = document.getElementById('spellReportList');
            reportList.innerHTML = ""; reportCard.style.display = "none";
            if(!isEnabled) return;

            const blocks = document.querySelectorAll('.char-msg, .state-narrator');
            let detected = [];

            blocks.forEach((block, idx) => {
                let text = block.innerText;
                spellRules.forEach(rule => {
                    if(rule.wrong.test(text)) {
                        rule.wrong.lastIndex = 0;
                        detected.push({ el: block, wrong: rule.wrong, right: rule.right, text: text, line: idx+1 });
                    }
                });
            });

            if(detected.length > 0) {
                reportCard.style.display = "block";
                detected.forEach(item => {
                    const div = document.createElement('div'); div.className = "spell-report-item";
                    div.innerHTML = `<div><strong>${item.line}행 근처:</strong> 오타 가능성 발견 -> <span>${item.right}</span></div><button class="spell-fix-trigger">교정</button>`;
                    div.querySelector('.spell-fix-trigger').onclick = () => {
                        saveHistoryState();
                        item.wrong.lastIndex = 0;
                        item.el.innerText = item.el.innerText.replace(item.wrong, item.right);
                        div.remove();
                    };
                    reportList.appendChild(div);
                });
            }
        }

        document.getElementById('btnSpellFixAll').onclick = () => {
            document.querySelectorAll('.spell-fix-trigger').forEach(b => b.click());
        };
        document.getElementById('btnSpellDismiss').onclick = () => { document.getElementById('spellReportCard').style.display="none"; };

        // 최종 파일 빌드 함수 (가변 테마 및 가변 서체 적용완료)
        function buildFinalHTML() {
            const p = themeProfiles[currentColorTheme];
            const chosenFont = currentFontType === "serif" ? `'Hina Mincho', 'Noto Serif KR', serif` : `'Noto Sans KR', sans-serif`;
            const charColorMap = getCharacterColorMap();

            let out = `<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><title>세션 로그 백업</title><style>
                @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&family=Noto+Serif+KR:wght@400;700&family=Hina+Mincho&display=swap');
                body { background-color: ${p.bg} !important; color: ${p.text} !important; font-family: ${chosenFont}; padding: 40px 20px; display: flex; flex-direction: column; align-items: center; }
                .wrapper { width: 100%; max-width: 850px; }
                h1 { font-size: 1.25rem; text-align: center; color: ${p.title} !important; background-color: ${p.titleBg} !important; border: 1px solid ${p.titleBorder} !important; padding: 12px; margin-bottom: 16px; }
                .container { border: 1px solid ${p.border}; padding: 20px; background: ${p.bg}; display: flex; flex-direction: column; gap: 4px; margin-bottom: 30px; }
                .row { display: flex; line-height: 1.6; font-size: 0.95rem; word-break: break-word; white-space: pre-wrap; }
                .name { font-weight: 700; margin-right: 6px; }
                .narrator { color: ${p.narrator} !important; font-weight: 500; }
                .system { color: ${p.sys} !important; font-style: italic; font-size: 0.88rem; opacity: 0.8; }
                mark.hl-yellow { background: #e0e0e0; color: #000; }
                mark.hl-green { background: #c0c0c0; color: #000; }
                mark.hl-blue { background: #a0a0a0; color: #000; }
                mark.hl-pink { background: #808080; color: #fff; }
            </style></head><body><div class="wrapper">`;

            document.querySelectorAll('#dynamicTabsOutput > .notion-card').forEach(card => {
                const title = card.querySelector('.output-room-title').innerText;
                out += `<h1>${title}</h1><div class="container">`;

                card.querySelectorAll('.notion-row').forEach(row => {
                    const isSys = row.querySelector('.state-system');
                    const isNarr = row.querySelector('.state-narrator');
                    const nameSpan = row.querySelector('.char-name');
                    const msgSpan = row.querySelector('.char-msg');

                    if (isSys) {
                        out += `<div class="row system">${isSys.innerHTML}</div>`;
                    } else if (isNarr) {
                        out += `<div class="row narrator">${isNarr.innerHTML}</div>`;
                    } else if (nameSpan && msgSpan) {
                        const speaker = row.dataset.speaker;
                        const color = charColorMap[speaker] || (currentColorTheme === 'roll20' ? '#111111' : '#ffffff');
                        out += `<div class="row"><span class="name" style="color:${color}">${nameSpan.innerText}</span><span>${msgSpan.innerHTML}</span></div>`;
                    }
                });
                out += `</div>`;
            });

            return out + `</div></body></html>`;
        }

        document.getElementById('btnCopy').addEventListener('click', () => {
            navigator.clipboard.writeText(buildFinalHTML()).then(() => {
                const b = document.getElementById('btnCopy'); const o = b.textContent;
                b.textContent = "복사 성공!"; setTimeout(() => b.textContent = o, 1500);
            });
        });

        document.getElementById('btnDownload').addEventListener('click', () => {
            const blob = new Blob([buildFinalHTML()], { type: 'text/html;charset=utf-8;' });
            const a = document.createElement("a"); a.href = URL.createObjectURL(blob);
            a.download = `${globalRoomTitle}_Roll20_Style.html`; a.click();
        });

        document.getElementById('logSearchInput').addEventListener('input', (e) => {
            const k = e.target.value.toLowerCase().trim();
            document.querySelectorAll('.notion-row').forEach(r => {
                if(r.innerText.toLowerCase().includes(k) || k === '') r.classList.remove('filtered-out');
                else r.classList.add('filtered-out');
            });
        });

        const styler = document.getElementById('textStyler');
        document.addEventListener('selectionchange', () => {
            const sel = window.getSelection();
            if(sel.isCollapsed || !sel.toString().trim()) { styler.style.display = 'none'; return; }
            let node = sel.anchorNode;
            while(node && node !== document.body) {
                if(node.classList && node.classList.contains('notion-block')) {
                    const range = sel.getRangeAt(0); const rect = range.getBoundingClientRect();
                    styler.style.left = `${rect.left + window.scrollX}px`; styler.style.top = `${rect.top + window.scrollY - 40}px`;
                    styler.style.display = 'flex'; return;
                }
                node = node.parentNode;
            }
            styler.style.display = 'none';
        });

        styler.addEventListener('mousedown', (e) => {
            e.preventDefault(); const btn = e.target.closest('[data-cmd]'); if(!btn) return;
            saveHistoryState(); document.execCommand(btn.getAttribute('data-cmd'), false, null);
        });
    </script>
</body>
</html>
