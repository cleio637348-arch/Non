<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roll20 로그 가공 에디터 (연속이름 제거 및 구분선 회색 완결본)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <style>
        /* 편집기 내부 전용 UI 디자인 (다크 노션 테마) */
        :root {
            --bg-main: #121212;
            --bg-surface: #1a1a1a;
            --bg-card: #222222;
            --bg-input: #161616;
            --border-notion: rgba(255, 255, 255, 0.08);
            --border-active: rgba(255, 255, 255, 0.2);
            --text-main: rgba(255, 255, 255, 0.85);
            --text-muted: rgba(255, 255, 255, 0.4);
            --text-label: rgba(255, 255, 255, 0.5);
            --accent-active: #4a90e2;
        }

        *, *::before, *::after { box-sizing: border-box; }
        body {
            margin: 0; padding: 20px 16px;
            background-color: var(--bg-main); font-family: "Noto Sans KR", sans-serif;
            color: var(--text-main); display: flex; flex-direction: column; align-items: center;
        }
        .main-wrapper { width: 100%; max-width: 950px; display: flex; flex-direction: column; gap: 14px; }
        
        header { border-bottom: 1px solid var(--border-notion); padding-bottom: 12px; }
        header h1 { font-size: 1.25rem; font-weight: 500; color: rgba(255, 255, 255, 0.9); margin: 0 0 4px 0; }
        header p { margin: 0; font-size: 0.8rem; color: var(--text-muted); }

        .notion-card { background: var(--bg-card); border: 1px solid var(--border-notion); padding: 14px; width: 100%; }
        .grid-config { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px; margin-bottom: 12px; }
        .input-group { display: flex; flex-direction: column; gap: 5px; }
        .input-group > .input-label { font-size: 0.75rem; color: var(--text-label); }

        input[type="search"], select {
            width: 100%; background-color: var(--bg-input); border: 1px solid var(--border-notion);
            color: var(--text-main); font-size: 0.85rem; padding: 8px 10px; outline: none;
        }
        select {
            cursor: pointer; appearance: none;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24' fill='none' stroke='rgba(255,255,255,0.4)' stroke-width='2'><polyline points='6 9 12 15 18 9'></polyline></svg>");
            background-repeat: no-repeat; background-position: right 8px center; background-size: 14px; padding-right: 30px;
        }

        .btn-group { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 8px; width: 100%; }
        .notion-btn {
            background: none; border: 1px solid var(--border-notion); color: var(--text-main);
            cursor: pointer; padding: 10px 14px; font-size: 0.85rem; text-align: center; font-weight: 500;
        }
        .notion-btn:hover { background: rgba(255,255,255,0.04); }
        .btn-toggle-active { background: var(--accent-active); color: #ffffff; border-color: var(--accent-active); }
        .btn-toggle-active:hover { background: #357abd; }

        /* 작업 공간 */
        .workspace { width: 100%; min-height: 500px; background: #1a1a1a; border: 1px solid var(--border-notion); padding: 15px; }
        .empty-guide { text-align: center; padding: 100px 20px; color: var(--text-muted); border: 1px dashed rgba(255,255,255,0.06); font-size: 0.85rem; line-height: 1.6; }
        
        #roll20Container { background: transparent; min-height: 100%; outline: none; }
        
        /* 에디터 내부 가이드 스크린샷 뷰 규칙 */
        #roll20Container img { max-width: 100% !important; height: auto !important; }
        /* 주사위 템플릿 반응형 완전 최적화 */
        #roll20Container .sheet-rolltemplate,
        #roll20Container [class*="sheet-rolltemplate"],
        #roll20Container table { 
            width: 100% !important; 
            max-width: 100% !important;
            min-width: 0 !important;
            box-sizing: border-box !important; 
            table-layout: fixed !important;
            overflow-wrap: break-word !important;
            word-break: break-word !important;
        }
        #roll20Container td, #roll20Container th {
            width: auto !important;
            max-width: 100% !important;
            overflow-wrap: break-word !important;
            word-break: break-word !important;
        }
        #roll20Container .message {
            width: 100% !important;
            max-width: 100% !important;
            box-sizing: border-box !important;
            overflow: hidden !important;
        }
        
        /* 버튼 눌러 회색 통일 활성화되었을 때만 에디터 내부에 실시간 스타일 피드백 반영 */
        #roll20Container.unify-bg-active .message { background-color: rgb(241, 241, 241) !important; border-color: transparent !important; box-shadow: none !important; }

        /* [요구사항 1] 에디터 내 구분선은 무조건 회색 처리 */
        #roll20Container .message .spacer { background-color: rgb(225, 225, 225) !important; }

        .message { position: relative !important; }
        .action-del-btn {
            position: absolute; right: 5px; top: 5px; background: #e53935; color: white; border: none; width: 18px; height: 18px; font-size: 11px;
            cursor: pointer; display: none; align-items: center; justify-content: center; z-index: 9999; border-radius: 2px; font-weight: bold;
        }
        .message:hover .action-del-btn { display: flex; }
        .search-filtered-out { display: none !important; }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <header>
            <h1>Roll20 로그 가공 프로세서</h1>
            <p>구분선 회색 고정 · 연속 대사 중복 이름/아바타 제거 · 주사위 반응형 최적화 · 연속 그룹 일괄 삭제</p>
        </header>

        <div class="notion-card">
            <div class="grid-config">
                <div class="input-group">
                    <span class="input-label">본문 실시간 검색</span>
                    <input type="search" id="logSearchInput" placeholder="검색어 입력 시 해당 문장만 필터링...">
                </div>
                <div class="input-group">
                    <span class="input-label">캐릭터 선택 일괄 삭제</span>
                    <div style="display: flex; gap: 4px;">
                        <select id="characterSelector">
                            <option value="">로그를 붙여넣으면 명단이 추출됩니다</option>
                        </select>
                        <button class="notion-btn" id="btnDeleteCharMessages" style="flex:0 0 auto; width:90px; padding:0; color:#ff8888; font-weight: 500;">일괄 삭제</button>
                    </div>
                </div>
            </div>

            <div class="btn-group">
                <button class="notion-btn" id="btnUnifyBg">배경 처리 모드: 원본 컬러 유지</button>
                <button class="notion-btn" id="btnDeleteHidden" style="color:#ff8888; border-color: rgba(255,136,136,0.2);">시스템 숨김 메시지 삭제</button>
            </div>
        </div>

        <div class="notion-card" style="padding: 10px 16px;">
            <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px;">
                <span style="font-size:0.75rem; color:var(--text-muted);">※ 가공 완료 후 복사본을 티스토리 글쓰기 [HTML 모드]에 통째로 붙여넣으세요.</span>
                <button class="notion-btn" id="btnManualCopy" style="padding:6px 20px; font-size:0.85rem; background:#ffffff; color:#121212; font-weight: bold; border-color: #fff;">가공완료본 화면 복사 (Alt+C)</button>
            </div>
        </div>

        <div class="workspace" id="mainWorkspace">
            <div class="empty-guide" id="uploadGuide">
                롤20 결과물 창에서 전체 선택 복사(Ctrl+C)한 후, 이곳에 붙여넣기(Ctrl+V) 해주세요.
            </div>
            <div id="roll20Container" contenteditable="true"></div>
        </div>
    </div>

    <script>
        const mainWorkspace = document.getElementById('mainWorkspace');
        const roll20Container = document.getElementById('roll20Container');
        const uploadGuide = document.getElementById('uploadGuide');
        const logSearchInput = document.getElementById('logSearchInput');
        const characterSelector = document.getElementById('characterSelector');
        const btnDeleteCharMessages = document.getElementById('btnDeleteCharMessages');
        const btnDeleteHidden = document.getElementById('btnDeleteHidden');
        const btnUnifyBg = document.getElementById('btnUnifyBg');
        const btnManualCopy = document.getElementById('btnManualCopy');

        // [요구사항 3] 자동으로 회색 통일되지 않도록 기본 상태를 false(유지)로 선언
        let flagBgUnified = false;

        mainWorkspace.addEventListener('paste', function(e) {
            e.preventDefault();
            let htmlData = (e.clipboardData || window.clipboardData).getData('text/html');
            if (!htmlData) htmlData = (e.clipboardData || window.clipboardData).getData('text/plain');
            if (!htmlData) { alert('클립보드에서 데이터를 가져오지 못했습니다.'); return; }

            uploadGuide.style.display = 'none';
            roll20Container.style.display = 'block';

            const parser = new DOMParser();
            const doc = parser.parseFromString(htmlData, 'text/html');
            const incomingRoot = doc.querySelector('.content') || doc.body;
            
            // [요구사항 2] 연속 대사 시 2번 사진 상태를 1번 사진 상태로 정리하는 결합 엔진 가동
            processContinuousMessages(incomingRoot);

            roll20Container.innerHTML = incomingRoot.innerHTML;
            refreshDeleteButtons();
            updateCharacterList();
        });

        // ─── 핵심 헬퍼 ───────────────────────────────────────────────

        // Roll20 실제 구조:
        //  ① 화자의 첫 메시지  : .spacer + .avatar + .by(이름:) + 텍스트
        //  ② 연속 같은 화자    : .spacer/.avatar/.by 모두 없이 텍스트만
        //  ③ desc/system(지문) : message.desc / message.system
        //  ④ 주사위 결과       : message.rollresult  (.by 있음)

        // .by 에서 화자 이름 추출 (없으면 null)
        function getSpeakerName(msgNode) {
            if (!msgNode || !msgNode.classList) return null;
            const byNode = msgNode.querySelector('.by');
            if (!byNode) return null;
            return byNode.textContent.replace(/:/g, '').trim() || null;
        }

        // desc / system 계열 → 연속 흐름 차단 기준
        function isBreaker(node) {
            if (!node || !node.classList) return true;
            return node.classList.contains('desc') ||
                   node.classList.contains('description') ||
                   node.classList.contains('system');
        }

        // .by가 없는 general 메시지 = Roll20 연속 대사 단락
        function isAnonymousContinuation(node) {
            if (!node || !node.classList) return false;
            if (isBreaker(node)) return false;
            if (node.classList.contains('rollresult')) return false;
            return !node.querySelector('.by');
        }

        // spacer 회색 고정
        function ensureGraySpacer(element) {
            if (!element || element.nodeType !== Node.ELEMENT_NODE) return;
            element.querySelectorAll('.spacer').forEach(s =>
                s.style.setProperty('background-color', 'rgb(225, 225, 225)', 'important')
            );
        }

        function cloneWithGraySpacer(node) {
            const c = node.cloneNode(true);
            if (c.nodeType === Node.ELEMENT_NODE) ensureGraySpacer(c);
            return c;
        }

        // ─── 3번: 연속 대사 병합 엔진 ────────────────────────────────
        // 같은 화자의 연속 메시지(.by 없는 단락)를 첫 메시지에 합치고 제거
        function processContinuousMessages(rootElement) {
            // 살아있는 컬렉션 대신 스냅샷 배열로 순회
            const nodes = Array.from(rootElement.querySelectorAll(':scope > .message'));
            let lastAnchor = null; // 가장 최근 "이름 있는" 메시지

            nodes.forEach(node => {
                ensureGraySpacer(node);

                if (isBreaker(node)) {
                    lastAnchor = null;
                    return;
                }

                if (node.classList.contains('rollresult')) {
                    // 주사위는 자체 .by가 있지만 독립 블록으로 취급
                    // → lastAnchor 유지 (같은 캐릭터의 주사위로 간주)
                    return;
                }

                if (isAnonymousContinuation(node)) {
                    // .by 없는 연속 대사 → lastAnchor에 병합
                    if (lastAnchor) {
                        lastAnchor.appendChild(document.createElement('br'));
                        Array.from(node.childNodes).forEach(child => {
                            const cl = child.classList;
                            const skip = cl && (
                                cl.contains('spacer') ||
                                cl.contains('flyout') ||
                                cl.contains('action-del-btn')
                            );
                            if (!skip) lastAnchor.appendChild(cloneWithGraySpacer(child));
                        });
                        node.remove();
                    }
                    // lastAnchor 없는 고아 continuation → 그냥 냅둠
                } else {
                    // .by 있는 새 화자 메시지 → 앵커 교체
                    const speaker = getSpeakerName(node);
                    if (speaker && lastAnchor && getSpeakerName(lastAnchor) === speaker) {
                        // 같은 화자 새 단락 → 병합 (spacer·avatar·by 제외하고 내용만)
                        lastAnchor.appendChild(document.createElement('br'));
                        Array.from(node.childNodes).forEach(child => {
                            const cl = child.classList;
                            const skip = cl && (
                                cl.contains('spacer') ||
                                cl.contains('avatar') ||
                                cl.contains('by') ||
                                cl.contains('flyout') ||
                                cl.contains('action-del-btn')
                            );
                            if (!skip) lastAnchor.appendChild(cloneWithGraySpacer(child));
                        });
                        node.remove();
                    } else {
                        lastAnchor = node;
                    }
                }
            });
        }

        // ─── refreshDeleteButtons / updateCharacterList ───────────────

        function refreshDeleteButtons() {
            roll20Container.querySelectorAll('.message').forEach(m => {
                if (!m.querySelector('.action-del-btn')) {
                    const delBtn = document.createElement('span');
                    delBtn.className = 'action-del-btn';
                    delBtn.innerText = '×';
                    delBtn.setAttribute('contenteditable', 'false');
                    delBtn.onclick = function(e) {
                        e.stopPropagation(); m.remove(); updateCharacterList();
                    };
                    m.appendChild(delBtn);
                }
            });
        }

        function updateCharacterList() {
            const messages = roll20Container.querySelectorAll('.message');
            const names = new Set();
            messages.forEach(m => {
                const name = getSpeakerName(m);
                if (name) names.add(name);
            });
            characterSelector.innerHTML = '<option value="">캐릭터 선택 (총 ' + names.size + '명)</option>';
            names.forEach(name => {
                const opt = document.createElement('option');
                opt.value = name; opt.innerText = name;
                characterSelector.appendChild(opt);
            });
        }

        // ─── 4번: 캐릭터 지정 삭제 (연속 그룹 전체) ─────────────────
        // 타깃 화자의 메시지 + 뒤따르는 anonymous continuation (.by 없음)을
        // 한 묶음으로 삭제. desc/system/다른 화자가 나오면 묶음 종료.
        btnDeleteCharMessages.addEventListener('click', function() {
            const targetName = characterSelector.value;
            if (!targetName) { alert('삭제할 캐릭터를 선택해 주세요.'); return; }

            if (!confirm('[' + targetName + '] 캐릭터의 대사를 삭제할까요?\n연속으로 이어진 모든 단락을 함께 삭제합니다.')) return;

            // 라이브 컬렉션 문제 방지: 스냅샷으로 고정
            const allMsgs = Array.from(roll20Container.querySelectorAll('.message'));
            let deleteCount = 0;
            let i = 0;

            while (i < allMsgs.length) {
                const node = allMsgs[i];

                if (getSpeakerName(node) === targetName) {
                    // 타깃 화자 발견 → 뒤 continuation까지 묶음 수집
                    const toDelete = [node];
                    let j = i + 1;
                    while (j < allMsgs.length) {
                        const next = allMsgs[j];
                        // 차단 조건: desc/system 또는 새 화자(.by 있음)
                        if (isBreaker(next)) break;
                        if (!isAnonymousContinuation(next) &&
                            !next.classList.contains('rollresult')) break;
                        toDelete.push(next);
                        j++;
                    }
                    toDelete.forEach(n => { n.remove(); deleteCount++; });
                    i = j;
                } else {
                    i++;
                }
            }

            alert('총 ' + deleteCount + '개의 대사 단락을 제거했습니다.');
            updateCharacterList();
        });

        btnDeleteHidden.addEventListener('click', function() {
            const targets = roll20Container.querySelectorAll('.message.hidden-message, .message.private');
            if (targets.length === 0) { alert('제거할 메시지가 없습니다.'); return; }
            if (confirm('숨김 메시지 ' + targets.length + '개를 삭제하시겠습니까?')) {
                targets.forEach(t => t.remove()); updateCharacterList();
            }
        });

        // [요구사항 3] 회색 통일 버튼 토글 스위치 작동 제어 제자리 복원
        btnUnifyBg.addEventListener('click', function() {
            flagBgUnified = !flagBgUnified;
            if (flagBgUnified) {
                roll20Container.classList.add('unify-bg-active');
                btnUnifyBg.innerText = '배경 처리 모드: 회색 일괄 통일';
                btnUnifyBg.classList.add('btn-toggle-active');
            } else {
                roll20Container.classList.remove('unify-bg-active');
                btnUnifyBg.innerText = '배경 처리 모드: 원본 컬러 유지';
                btnUnifyBg.classList.remove('btn-toggle-active');
            }
        });

        logSearchInput.addEventListener('input', function(e) {
            const val = e.target.value.trim().toLowerCase();
            roll20Container.querySelectorAll('.message').forEach(m => {
                if (!val || m.innerText.toLowerCase().includes(val)) m.classList.remove('search-filtered-out');
                else m.classList.add('search-filtered-out');
            });
        });

        // [티스토리 안전 구조 추출 및 오버라이드 엔진]
        function copyOriginalLayoutHtml() {
            if (!roll20Container.children.length) { alert('가공 처리할 로그 데이터가 없습니다.'); return; }

            const outWrapper = document.createElement('div');
            outWrapper.className = 'content';
            outWrapper.id = 'tistoryRoll20Wrapper';
            outWrapper.style.cssText = 'width: 100% !important; max-width: 100% !important; display: block !important;';

            // 티스토리 글로벌 방어 스타일시트 동봉
            const embedStyle = document.createElement('style');
            embedStyle.innerText = `
                #tistoryRoll20Wrapper, #tistoryRoll20Wrapper * { box-sizing: border-box !important; }
                #tistoryRoll20Wrapper img { max-width: 100% !important; height: auto !important; }
                #tistoryRoll20Wrapper .message { width: 100% !important; max-width: 100% !important; min-width: 100% !important; display: block !important; float: none !important; clear: both !important; }
                
                /* [요구사항 1] 티스토리 출력본에서도 구분선색 무조건 회색 강제 스크린 선언 */
                #tistoryRoll20Wrapper .message .spacer { background-color: rgb(225, 225, 225) !important; border: none !important; }

                /* 주사위 템플릿 크기 폭발 방지 가드레일 */
                #tistoryRoll20Wrapper .sheet-rolltemplate, 
                #tistoryRoll20Wrapper table, 
                #tistoryRoll20Wrapper [class*="sheet-rolltemplate"] { 
                    width: 100% !important; 
                    max-width: 100% !important; 
                    min-width: 0 !important; 
                    table-layout: fixed !important; 
                    display: table !important;
                    box-sizing: border-box !important;
                    overflow-wrap: break-word !important;
                    word-break: break-word !important;
                }
                #tistoryRoll20Wrapper td, #tistoryRoll20Wrapper th { 
                    width: auto !important; 
                    max-width: 100% !important;
                    overflow-wrap: break-word !important;
                    word-break: break-word !important;
                }
                #tistoryRoll20Wrapper .message {
                    width: 100% !important;
                    max-width: 100% !important;
                    box-sizing: border-box !important;
                    overflow: hidden !important;
                }
            `;
            outWrapper.appendChild(embedStyle);

            Array.from(roll20Container.children).forEach(n => {
                if (n.tagName === 'STYLE' || n.tagName === 'SCRIPT') return;
                
                const clone = n.cloneNode(true);
                
                // 에디터 기능 요소 세척
                const dBtn = clone.querySelector('.action-del-btn');
                if (dBtn) dBtn.remove();
                if (clone.removeAttribute) clone.removeAttribute('contenteditable');

                // [요구사항 1] 추출되는 모든 노드의 구분선 강제 인라인 회색 매핑 고정
                const targetSpacers = clone.querySelectorAll('.spacer');
                targetSpacers.forEach(s => {
                    s.style.setProperty('background-color', 'rgb(225, 225, 225)', 'important');
                });

                // [요구사항 3] '회색 일괄 통일' 버튼 모드가 켜져 있을 때만 대사 상자 배경을 인라인으로 강제 변경
                if (flagBgUnified && clone.classList && clone.classList.contains('message')) {
                    clone.style.setProperty('background-color', 'rgb(241, 241, 241)', 'important');
                    clone.style.setProperty('border-color', 'transparent', 'important');
                    clone.style.setProperty('box-shadow', 'none', 'important');
                }

                // 주사위 인라인 가로폭 최적화 100% 보정 유지
                const inlineTables = clone.querySelectorAll('.sheet-rolltemplate, table, [class*="sheet-rolltemplate"]');
                inlineTables.forEach(t => {
                    t.style.cssText = "width: 100% !important; max-width: 100% !important; min-width: 0 !important; table-layout: fixed !important; display: table !important; box-sizing: border-box !important; overflow-wrap: break-word !important; word-break: break-word !important;";
                });

                const inlineCells = clone.querySelectorAll('td, th');
                inlineCells.forEach(c => {
                    c.style.setProperty('width', 'auto', 'important');
                    c.style.setProperty('max-width', '100%', 'important');
                    c.style.setProperty('overflow-wrap', 'break-word', 'important');
                    c.style.setProperty('word-break', 'break-word', 'important');
                });
                
                outWrapper.appendChild(clone);
            });

            navigator.clipboard.writeText(outWrapper.outerHTML).then(() => {
                alert('🎉 구분선 회색 고정 및 중복 이름이 완벽히 정리된 소스코드가 복사되었습니다!\n티스토리 [HTML 모드]에 붙여넣으세요.');
            }).catch(() => { alert('클립보드 접근 권한 제한으로 복사에 실패했습니다.'); });
        }

        btnManualCopy.addEventListener('click', copyOriginalLayoutHtml);
        document.addEventListener('keydown', (e) => {
            if (e.code === 'KeyC' && e.altKey) { e.preventDefault(); copyOriginalLayoutHtml(); }
        });
    </script>
</body>
</html>
